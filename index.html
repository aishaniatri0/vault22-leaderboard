<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Vault22 · Invest</title>
<meta name="description" content="Learn from proven investing styles, then build your own version. A premium, AI-first Vault22 experience." />
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
<link rel="icon" type="image/png" sizes="48x48" href="favicon-48.png" />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   VAULT22 INVESTOR LEADERBOARD - live-app design system (light)
   Reskinned to match the real Vault22 app. Mock data. Not advice.
   ============================================================ */
:root{
  --teal:#01C38D; --teal-2:#12D89B; --teal-deep:#00A578; --green-soft:#E7F8F1;
  --navy:#0A1420; --navy-2:#162B45; --navy-3:#22303F;
  --gold:#B54708; --gold-2:#8A5A00;
  --violet:#6C5CE7; --sky:#3B82F6; --rose:#F04438; --amber:#F79009;
  --ink:#0A1420; --ink-soft:#52627A; --ink-mute:#8A9AAC;
  --line:#E7E9EC; --line-2:#DDE1E6;
  --bg-0:#F5F7F8; --bg-1:#FFFFFF; --bg-grad:#F5F7F8;
  --glass:#FFFFFF; --glass-2:#F6F8FA; --glass-hi:#F0F2F5; --tile:#F1F3F5;
  --stroke:#E7E9EC;
  --pos:#12B76A; --neg:#F04438; --warn:#F79009;
  --shadow-sm:0 1px 2px rgba(16,24,40,.05);
  --shadow-md:0 12px 28px -14px rgba(16,24,40,.22);
  --shadow-lg:0 28px 56px -20px rgba(16,24,40,.32);
  --r-xl:24px; --r-lg:18px; --r-md:14px; --r-sm:10px;
  --sp:clamp(16px,2vw,26px);
  --sbw:264px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;overflow-x:clip}
body{
  font-family:'Inter','Onest',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  background:var(--bg-grad);color:var(--ink);
  -webkit-font-smoothing:antialiased;line-height:1.5;min-height:100vh;letter-spacing:.1px;
}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
h1,h2,h3,h4{margin:0;font-weight:700;letter-spacing:-.4px;color:var(--ink)}
::selection{background:rgba(1,195,141,.18)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:rgba(10,20,32,.16);border-radius:20px}
::-webkit-scrollbar-track{background:transparent}

/* ---------- layout shell ---------- */
.app{display:grid;grid-template-columns:var(--sbw) 1fr;min-height:100vh}
.sidebar{position:sticky;top:0;height:100vh;padding:20px 14px;display:flex;flex-direction:column;gap:6px;background:#fff;border-right:1px solid var(--line);z-index:40}
.brand{display:flex;align-items:center;gap:11px;padding:6px 8px 18px}
.brand-logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(145deg,var(--teal),var(--teal-deep));display:grid;place-items:center;box-shadow:0 6px 16px -6px rgba(1,195,141,.5)}
.brand-logo svg{width:19px;height:19px}
.brand-name{font-weight:800;font-size:18px;letter-spacing:-.5px;color:var(--ink)}
.brand-name small{display:block;font-size:10px;font-weight:500;color:var(--ink-mute);letter-spacing:.4px;text-transform:uppercase}
.nav{display:flex;flex-direction:column;gap:2px;margin-top:2px}
.nav-label{font-size:10.5px;text-transform:uppercase;letter-spacing:1.2px;color:var(--ink-mute);padding:14px 12px 6px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:12px;color:var(--ink-soft);font-weight:500;font-size:14.5px;transition:.2s;position:relative}
.nav-item .ic{width:20px;height:20px;flex:none;opacity:.9;color:var(--ink-mute)}
.nav-item:hover{background:var(--glass-2);color:var(--ink)}
.nav-item:hover .ic{color:var(--ink-soft)}
.nav-item.active{background:var(--green-soft);color:var(--teal-deep);font-weight:600}
.nav-item.active .ic{color:var(--teal);opacity:1}
.nav-item .badge{margin-left:auto;font-size:11px;background:var(--tile);padding:2px 8px;border-radius:20px;color:var(--ink-soft);font-weight:600}
.sidebar-foot{margin-top:auto;padding:12px 8px 4px}
.dna-mini{background:var(--glass-2);border:1px solid var(--line);border-radius:14px;padding:13px 14px}
.dna-mini .t{font-size:10.5px;color:var(--ink-mute);text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.dna-mini .v{font-weight:700;font-size:14px;margin-top:3px}
.dna-mini .bar{height:6px;border-radius:6px;background:rgba(10,20,32,.08);margin-top:9px;overflow:hidden}
.dna-mini .bar>i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--teal),var(--sky))}

/* topbar */
.main{min-width:0;display:flex;flex-direction:column}
.appbar{position:sticky;top:0;z-index:35;background:#fff}
.topbar{display:flex;align-items:center;gap:14px;padding:13px clamp(16px,3vw,30px);background:#fff;border-bottom:1px solid var(--line)}
.hamburger{display:none;width:42px;height:42px;border-radius:12px;border:1px solid var(--line);background:#fff;place-items:center;flex:none}
.hamburger svg{width:22px;height:22px;color:var(--ink)}
.hamburger:hover{background:var(--glass-2)}
.search{flex:1;min-width:0;max-width:520px;display:flex;align-items:center;gap:10px;background:var(--tile);border:1px solid transparent;border-radius:12px;padding:10px 14px;transition:.2s}
.search:focus-within{border-color:var(--teal);background:#fff;box-shadow:0 0 0 3px rgba(1,195,141,.12)}
.search svg{width:18px;height:18px;color:var(--ink-mute);flex:none}
.search input{flex:1;min-width:0;background:none;border:none;outline:none;color:var(--ink);font-size:14.5px}
.search input::placeholder{color:var(--ink-mute)}
.search .kbd{font-size:11px;color:var(--ink-mute);border:1px solid var(--line-2);border-radius:6px;padding:1px 6px}
.top-actions{display:flex;align-items:center;gap:10px;margin-left:auto}
.icon-btn{width:42px;height:42px;border-radius:12px;background:#fff;border:1px solid var(--line);display:grid;place-items:center;transition:.2s;position:relative}
.icon-btn:hover{background:var(--glass-2);transform:translateY(-1px)}
.icon-btn svg{width:20px;height:20px;color:var(--ink-soft)}
.icon-btn .dot{position:absolute;top:8px;right:9px;width:8px;height:8px;border-radius:50%;background:var(--rose);box-shadow:0 0 0 3px #fff}
.tara-btn{display:flex;align-items:center;gap:9px;padding:9px 15px;border-radius:12px;background:linear-gradient(100deg,#7C6CFF,#5B8DEF);border:none;font-weight:600;font-size:14px;color:#fff;transition:.2s;box-shadow:0 2px 6px -3px rgba(108,92,231,.3)}
.tara-btn:hover{transform:translateY(-1px);box-shadow:0 12px 26px -10px rgba(108,92,231,.7)}
.tara-orb{width:22px;height:22px;border-radius:50%;background:conic-gradient(from 0deg,#7C6CFF,#4FC3F7,#01C38D,#7C6CFF);box-shadow:0 0 12px rgba(108,92,231,.5);animation:spin 8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.avatar{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-weight:700;color:#fff;background:linear-gradient(145deg,var(--teal),var(--teal-deep));font-size:15px}

/* content */
.content{padding:clamp(18px,3vw,34px);max-width:1320px;width:100%;margin:0 auto;animation:fade .45s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.view{display:none}
.view.active{display:block}

/* reusable */
.glass{background:#fff;border:1px solid var(--line);border-radius:var(--r-lg)}
.section-head{display:flex;align-items:flex-end;gap:14px;margin:32px 0 16px}
.section-head h2{font-size:clamp(19px,2.4vw,24px)}
.section-head .sub{color:var(--ink-mute);font-size:13.5px;margin-top:3px}
.section-head .link{margin-left:auto;color:var(--teal-deep);font-weight:600;font-size:13.5px;display:flex;align-items:center;gap:5px;white-space:nowrap;cursor:pointer}
.section-head .link:hover{color:var(--teal)}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:5px 11px;border-radius:20px;background:var(--tile);border:1px solid transparent;color:var(--ink-soft);white-space:nowrap}
.pill.pos{background:#E7F8EF;color:#067647;border-color:#B6F0D0}
.pill.neg{background:#FEF3F2;color:#B42318;border-color:#FECDCA}
.pill.gold{background:#FEF7E6;color:#B54708;border-color:#FEDF89}
.pill.violet{background:#F4F3FF;color:#5925DC;border-color:#D9D6FE}
.pill.shariah{background:#E7F8F1;color:#067A5B;border-color:#A6F4C5}
.chip-row{display:flex;gap:9px;flex-wrap:wrap}
.chip{padding:8px 14px;border-radius:11px;background:#fff;border:1px solid var(--line);font-size:13px;font-weight:500;color:var(--ink-soft);transition:.18s;white-space:nowrap}
.chip:hover{background:var(--glass-2);color:var(--ink);border-color:var(--line-2)}
.chip.on{background:var(--green-soft);color:var(--teal-deep);border-color:rgba(1,195,141,.4);font-weight:600}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 18px;border-radius:12px;font-weight:600;font-size:14px;transition:.2s;border:1px solid transparent}
.btn:hover{transform:translateY(-1px)}
.btn-primary{background:var(--teal);color:#06231A;box-shadow:0 2px 6px -3px rgba(1,195,141,.35)}
.btn-primary:hover{background:var(--teal-2)}
.btn-ghost{background:#fff;border-color:var(--line);color:var(--ink)}
.btn-ghost:hover{background:var(--glass-2);border-color:var(--line-2)}
.btn-tara{background:#F4F3FF;border-color:#D9D6FE;color:#5925DC}
.btn-tara:hover{background:#EDEBFF}
.btn-block{width:100%}
.btn-sm{padding:9px 13px;font-size:13px;border-radius:10px}
.grid{display:grid;gap:clamp(14px,1.8vw,20px)}
.metric{display:flex;flex-direction:column;gap:2px}
.metric .k{font-size:11.5px;color:var(--ink-mute);display:flex;align-items:center;gap:5px}
.metric .val{font-size:16px;font-weight:700;color:var(--ink)}
.help{width:15px;height:15px;border-radius:50%;border:1px solid var(--line-2);display:inline-grid;place-items:center;font-size:10px;color:var(--ink-mute);cursor:help;font-weight:700}
.help:hover{border-color:var(--teal);color:var(--teal)}
.dnum{font-variant-numeric:tabular-nums}

/* hero */
.hero{position:relative;overflow:hidden;border-radius:var(--r-xl);padding:clamp(26px,4vw,44px);margin-bottom:8px;background:#fff;border:1px solid var(--line);box-shadow:var(--shadow-sm)}
.hero::after{content:"";position:absolute;inset:0;background:radial-gradient(700px 320px at 100% -10%,rgba(1,195,141,.12),transparent 60%),radial-gradient(500px 260px at -5% 120%,rgba(108,92,231,.08),transparent 60%);pointer-events:none}
.hero-inner{position:relative;z-index:2;max-width:760px}
.hero h1{font-size:clamp(28px,4.4vw,44px);line-height:1.06;letter-spacing:-1.2px;color:var(--ink)}
.hero h1 .g{background:linear-gradient(100deg,var(--teal),var(--sky));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:var(--ink-soft);font-size:clamp(14px,1.7vw,17px);margin:16px 0 24px;max-width:620px}
.hero-cta{display:flex;gap:12px;flex-wrap:wrap}
.hero-stats{display:flex;gap:26px;flex-wrap:wrap;margin-top:30px}
.hero-stats .s .n{font-size:24px;font-weight:800;color:var(--ink)}
.hero-stats .s .l{font-size:12px;color:var(--ink-mute)}

/* cards */
.card{background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);padding:20px;transition:.24s;position:relative;overflow:hidden}
.card.lift{will-change:transform}
.card.lift:hover{transform:translateY(-4px);border-color:var(--line-2);box-shadow:var(--shadow-md)}
.card-sheen::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(1,195,141,.25),transparent)}

/* investor / legend card */
.inv-card{cursor:pointer}
.inv-top{display:flex;align-items:center;gap:13px}
.inv-ava{width:52px;height:52px;border-radius:14px;display:grid;place-items:center;font-weight:800;font-size:18px;color:#fff;flex:none;box-shadow:0 6px 14px -8px rgba(16,24,40,.4)}
.inv-name{font-weight:700;font-size:16px;display:flex;align-items:center;gap:7px;color:var(--ink)}
.inv-sub{font-size:12.5px;color:var(--ink-mute);margin-top:1px}
.match-ring{margin-left:auto;width:52px;height:52px;flex:none;position:relative}
.match-ring .lbl{position:absolute;inset:0;display:grid;place-items:center;font-size:13px;font-weight:800}
.inv-mets{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:16px 0}
.spark{height:44px;width:100%;margin:6px 0 4px}
.inv-tags{display:flex;gap:7px;flex-wrap:wrap;margin:12px 0}
.cta-row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.cta-row .btn{flex:1;min-width:0}

/* pie */
.pie-wrap{display:flex;align-items:center;gap:16px}
.pie-legend{display:flex;flex-direction:column;gap:6px;font-size:12.5px;min-width:0}
.pie-legend .li{display:flex;align-items:center;gap:8px}
.pie-legend .dot{width:9px;height:9px;border-radius:3px;flex:none}
.pie-legend .li .pc{margin-left:auto;color:var(--ink-mute);font-variant-numeric:tabular-nums}

/* bars */
.hbar{display:flex;flex-direction:column;gap:11px}
.hbar .row{display:grid;grid-template-columns:130px 1fr 46px;align-items:center;gap:12px;font-size:13px;color:var(--ink-soft)}
.hbar .track{height:9px;border-radius:8px;background:rgba(10,20,32,.07);overflow:hidden}
.hbar .track>i{display:block;height:100%;border-radius:8px;background:linear-gradient(90deg,var(--teal),var(--sky));transition:width .8s cubic-bezier(.2,.7,.2,1)}
.hbar .num{text-align:right;color:var(--ink-soft);font-variant-numeric:tabular-nums}

/* badges gamification */
.badge-tile{display:flex;gap:12px;align-items:center;padding:14px;border-radius:14px;background:#fff;border:1px solid var(--line)}
.badge-ic{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;font-size:22px;flex:none;background:#FEF7E6;border:1px solid #FEDF89}
.badge-tile.locked{opacity:.5;filter:grayscale(.4)}
.badge-tile .bt{font-weight:600;font-size:13.5px;color:var(--ink)}
.badge-tile .bd{font-size:11.5px;color:var(--ink-mute)}

/* modal / drawer */
.scrim{position:fixed;inset:0;background:rgba(16,24,40,.44);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:80;opacity:0;pointer-events:none;transition:.28s}
.scrim.show{opacity:1;pointer-events:auto}
.modal{position:fixed;z-index:90;top:50%;left:50%;transform:translate(-50%,-46%);width:min(960px,94vw);max-height:90vh;overflow:auto;background:#fff;border:1px solid var(--line);border-radius:var(--r-xl);box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:.3s cubic-bezier(.2,.8,.2,1)}
.modal.show{opacity:1;pointer-events:auto;transform:translate(-50%,-50%)}
.modal-head{position:sticky;top:0;display:flex;align-items:center;gap:12px;padding:18px 22px;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);z-index:3}
.modal-head h3{font-size:18px;flex:1;min-width:0;color:var(--ink)}
.modal-body{padding:22px}
.close-x{width:38px;height:38px;border-radius:11px;background:var(--glass-2);border:1px solid var(--line);display:grid;place-items:center;flex:none}
.close-x:hover{background:var(--tile)}
.close-x svg{width:18px;height:18px;color:var(--ink-soft)}

/* Tara side panel */
.tara-panel{position:fixed;top:0;right:0;height:100vh;width:min(420px,92vw);z-index:95;transform:translateX(102%);transition:.34s cubic-bezier(.2,.8,.2,1);background:#fff;border-left:1px solid var(--line);display:flex;flex-direction:column;box-shadow:-24px 0 50px -30px rgba(16,24,40,.3)}
.tara-panel.show{transform:none}
.tara-head{display:flex;align-items:center;gap:12px;padding:20px;border-bottom:1px solid var(--line)}
.tara-head .tara-orb{width:34px;height:34px}
.tara-head .tn{font-weight:700;font-size:16px}
.tara-head .ts{font-size:12px;color:var(--ink-mute)}
.tara-body{flex:1;overflow:auto;padding:18px;display:flex;flex-direction:column;gap:14px}
.tara-msg{background:#F4F3FF;border:1px solid #E4E1FF;border-radius:16px 16px 16px 5px;padding:14px 16px;font-size:14px;line-height:1.55;color:#2E2A5B}
.tara-msg.you{background:var(--glass-2);border-color:var(--line);border-radius:16px 16px 5px 16px;align-self:flex-end;max-width:85%;color:var(--ink)}
.tara-msg .h{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#6C5CE7;margin-bottom:6px;font-weight:700}
.tara-sugs{display:flex;flex-direction:column;gap:8px;padding:14px 18px;border-top:1px solid var(--line)}
.tara-sug{text-align:left;padding:11px 14px;border-radius:11px;background:var(--glass-2);border:1px solid var(--line);font-size:13px;color:var(--ink-soft);transition:.18s}
.tara-sug:hover{background:#F4F3FF;color:#5925DC;border-color:#D9D6FE}

/* tooltip */
.tip{position:fixed;z-index:120;max-width:300px;padding:13px 15px;border-radius:12px;background:#fff;border:1px solid var(--line-2);box-shadow:var(--shadow-md);font-size:13px;line-height:1.5;color:var(--ink-soft);opacity:0;pointer-events:none;transform:translateY(4px);transition:.18s}
.tip.show{opacity:1;transform:none}
.tip .tt{font-weight:700;color:var(--ink);margin-bottom:5px;font-size:13.5px;display:flex;align-items:center;gap:6px}
.tip .tara-line{margin-top:9px;padding-top:9px;border-top:1px solid var(--line);color:#6C5CE7;font-size:12.5px;display:flex;gap:7px}

/* toast */
.toast-wrap{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:130;display:flex;flex-direction:column;gap:10px;align-items:center}
.toast{background:var(--ink);border:1px solid var(--navy-2);border-radius:13px;padding:13px 18px;font-size:13.5px;color:#fff;box-shadow:var(--shadow-md);display:flex;align-items:center;gap:10px;animation:pop .3s ease}
@keyframes pop{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.toast .i{width:22px;height:22px;border-radius:50%;background:rgba(1,195,141,.25);display:grid;place-items:center;color:var(--teal-2);flex:none}

/* stepper */
.steps{display:flex;gap:8px;margin-bottom:22px}
.steps .st{flex:1;text-align:center}
.steps .st .n{width:34px;height:34px;border-radius:50%;margin:0 auto 8px;display:grid;place-items:center;font-weight:700;background:var(--tile);border:1px solid var(--line);font-size:14px;color:var(--ink-soft);transition:.25s}
.steps .st .l{font-size:12px;color:var(--ink-mute)}
.steps .st.on .n{background:var(--teal);color:#06231A;border-color:transparent;box-shadow:0 8px 18px -8px rgba(1,195,141,.6)}
.steps .st.on .l{color:var(--ink);font-weight:600}
.steps .st.done .n{background:var(--green-soft);color:var(--teal-deep);border-color:rgba(1,195,141,.35)}
.seg{display:flex;background:var(--tile);border:1px solid var(--line);border-radius:12px;padding:5px;gap:5px}
.seg button{flex:1;padding:11px;border-radius:9px;font-size:13px;font-weight:600;color:var(--ink-soft);transition:.18s}
.seg button.on{background:#fff;color:var(--teal-deep);box-shadow:var(--shadow-sm)}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-radius:13px;background:#fff;border:1px solid var(--line);margin-bottom:10px}
.sw{width:46px;height:27px;border-radius:20px;background:rgba(10,20,32,.16);position:relative;transition:.22s;flex:none}
.sw::after{content:"";position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;box-shadow:var(--shadow-sm);transition:.22s}
.sw.on{background:var(--teal)}
.sw.on::after{left:22px}
.amount-in{display:flex;align-items:center;gap:10px;background:var(--tile);border:1px solid var(--line);border-radius:14px;padding:16px 18px;font-size:26px;font-weight:700}
.amount-in span{color:var(--ink-mute)}
.amount-in input{flex:1;background:none;border:none;outline:none;color:var(--ink);font-size:26px;font-weight:700;font-family:inherit;width:100%}
.quick-amt{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}

/* compliance banner */

          <button class="icon-btn" id="notifBell" aria-label="Notifications" title="Notifications" onclick="Notifs.toggle(event)"><span class="dot" id="notifDot"></span><svg viewBox="0 0 24 24" fill="none"><path d="M6 9a6 6 0 1112 0c0 5 2 6 2 6H4s2-1 2-6z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 20a2 2 0 004 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
          <div class="avatar" title="Aishani Atri">AA</div>

      <nav class="subtabs" id="subtabs" role="tablist" aria-label="Leaderboard sections"></nav>

    <main class="content" id="content" role="main" tabindex="-1"><!-- views injected --></main>

</div>

<div class="nav-scrim" id="navScrim" onclick="toggleNav(false)"></div>

<!-- notifications popover -->

<div class="tara-float" id="taraFloat" role="status" aria-live="polite"></div>

    <div style="flex:1"><div class="tn">Tara</div><div class="ts">Your AI wealth guide</div></div>
    <button class="close-x" onclick="Tara.close()"><svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
  </div>
  <div class="tara-body" id="taraBody"></div>
